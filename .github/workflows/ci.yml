name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    container: alpine:3
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: apk add --no-cache luacheck
      - name: Run luacheck
        run: luacheck .

  test:
    runs-on: ubuntu-latest
    container: alpine:3
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua
        run: apk add --no-cache lua5.4
      - name: Run tests
        run: lua5.4 tests/test_tracker.lua

  package:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Create zip
        run: |
          mkdir AkistosCraftCompendium
          cp AkistosCraftCompendium.toc Namespace.lua AkistosCraftCompendium/
          cp -r Controller Model View AkistosCraftCompendium/
          zip -r AkistosCraftCompendium.zip AkistosCraftCompendium/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkistosCraftCompendium
          path: AkistosCraftCompendium.zip

  deploy:
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AkistosCraftCompendium
      - name: Upload to CurseForge
        run: |
          echo "Fetching game versions..."
          VERSIONS=$(curl -sL -H "X-Api-Token: $CF_API_KEY" \
            "https://wow.curseforge.com/api/game/versions")
          echo "Response: $VERSIONS"
          VERSION_ID=$(echo "$VERSIONS" | jq -r '.[] | select(.name == "1.15.8") | .id')
          echo "Version ID: $VERSION_ID"
          if [ -z "$VERSION_ID" ]; then
            echo "ERROR: Could not find version ID for 1.15.8"
            exit 1
          fi
          curl -sL --fail-with-body -X POST \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata={\"gameVersions\":[$VERSION_ID],\"releaseType\":\"release\",\"changelog\":\"\"}" \
            -F "file=@AkistosCraftCompendium.zip" \
            "https://wow.curseforge.com/api/projects/1546116/upload-file"
        env:
          CF_API_KEY: ${{ secrets.ACCToken }}
