name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    container: alpine:3
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: apk add --no-cache luacheck
      - name: Run luacheck
        run: luacheck .

  test:
    runs-on: ubuntu-latest
    container: alpine:3
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua
        run: apk add --no-cache lua5.4
      - name: Run tests
        run: lua5.4 tests/test_tracker.lua

  package:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Create zip
        run: zip -r AkistosCraftCompendium.zip AkistosCraftCompendium.toc Namespace.lua Controller/ Model/ View/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkistosCraftCompendium
          path: AkistosCraftCompendium.zip
