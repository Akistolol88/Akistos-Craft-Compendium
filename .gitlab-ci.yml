stages:
  - lint
  - test
  - package

lint:
  stage: lint
  image: pipelinecomponents/luacheck:latest
  script:
    - luacheck .

test:
  stage: test
  image: alpine:3
  before_script:
    - apk add --no-cache lua5.4
  script:
    - lua5.4 tests/test_tracker.lua

package:
  stage: package
  script: 
    - apt-get update -y
    - apt-get install -y zip
    - zip -r AkistosCraftCompendium.zip AkistosCraftCompendium.toc Namespace.lua Controller/ Model/ View/
  artifacts: 
    paths:
      - AkistosCraftCompendium.zip