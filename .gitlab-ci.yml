stages:
  - lint
  - test
  - package
  - deploy

lint:
  stage: lint
  image: public.ecr.aws/docker/library/alpine:3
  before_script:
    - apk add --no-cache luacheck
  script:
    - luacheck .

test:
  stage: test
  image: public.ecr.aws/docker/library/alpine:3
  before_script:
    - apk add --no-cache lua5.4
  script:
    - lua5.4 tests/test_tracker.lua

package:
  stage: package
  image: public.ecr.aws/docker/library/alpine:3
  before_script:
    - apk add --no-cache zip
  script:
    - mkdir AkistosCraftCompendium
    - cp AkistosCraftCompendium.toc Namespace.lua AkistosCraftCompendium/
    - cp -r Controller Model View AkistosCraftCompendium/
    - zip -r AkistosCraftCompendium.zip AkistosCraftCompendium/
  artifacts:
    paths:
      - AkistosCraftCompendium.zip
    expire_in: 1 week

deploy:
  stage: deploy
  image: public.ecr.aws/docker/library/alpine:3
  dependencies:
    - package
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      echo "Fetching game versions..."
      VERSIONS=$(curl -sL -H "X-Api-Token: $ACCToken" \
        "https://wow.curseforge.com/api/game/1/versions")
      echo "Response: $VERSIONS"
      VERSION_ID=$(echo "$VERSIONS" | jq -r '.[] | select(.name == "1.15.8") | .id')
      echo "Version ID: $VERSION_ID"
      if [ -z "$VERSION_ID" ]; then
        echo "ERROR: Could not find version ID for 1.15.8"
        exit 1
      fi
      curl -sL --fail-with-body -X POST \
        -H "X-Api-Token: $ACCToken" \
        -F "metadata={\"gameVersions\":[$VERSION_ID],\"releaseType\":\"release\"}" \
        -F "file=@AkistosCraftCompendium.zip" \
        "https://wow.curseforge.com/api/projects/1546116/upload-file"
  only:
    - main
